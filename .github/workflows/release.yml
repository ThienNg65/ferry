name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build:vite

      #####################################
      # Current Version
      #####################################

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      #####################################
      # Finalize changelog
      #####################################

      - name: Prepare release
        run: node .github/scripts/prepare-release.js

      - name: Commit release changelog
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add CHANGELOG.md
          git commit -m "docs(changelog): release v${{ steps.version.outputs.version }}" || exit 0

          git push

      #####################################
      # Tag
      #####################################

      - name: Create tag
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      #####################################
      # Tauri Build & Release
      #####################################

      - name: Build & Publish Tauri Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: 'Ferry v${{ steps.version.outputs.version }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: false
          prerelease: false

      #####################################
      # Next version
      #####################################

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Update VERSION
        shell: bash
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');fs.writeFileSync('VERSION',p.version)"

      - name: Prepare next changelog
        run: node .github/scripts/prepare-next-version.js

      #####################################
      # Commit next development cycle
      #####################################

      - name: Commit next version
        run: |
          git add .
          git commit -m "chore: start next development cycle"
          git push