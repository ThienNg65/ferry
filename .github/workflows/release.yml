name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-deps

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Tag release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          # Check if tag already exists
          if git rev-parse "v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists. Skipping tag creation."
          else
            git tag "v${version}"
            git push origin "v${version}"
          fi

      - name: Package and publish
        uses: nick-fields/retry@v3
        with:
          # electron-builder's GitHub publisher has no built-in retry for
          # transient GitHub API errors (e.g. 503s during a GitHub incident) -
          # retry the whole step. Repackaging is cheap since `out/` is already
          # built; a retry just re-runs electron-builder against it.
          max_attempts: 3
          timeout_minutes: 20
          retry_wait_seconds: 60
          command: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Bump version to next patch and push back to main
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          npm version patch --no-git-tag-version

          new_version=$(node -p "require('./package.json').version")
          node -e "require('fs').writeFileSync('VERSION', require('./package.json').version + '\n')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json VERSION
          git commit -m "chore(release): bump version to ${new_version} [skip ci]"
          git push origin HEAD:main
