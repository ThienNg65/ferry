name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-deps

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Fill in release notes from the changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          release_id=$(gh api "repos/${{ github.repository }}/releases/tags/v${version}" --jq .id)
          gh api --method PATCH "repos/${{ github.repository }}/releases/$release_id" -f generate_release_notes=true

      - name: Bump version to next patch and push back to main
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          npm version patch --no-git-tag-version

          new_version=$(node -p "require('./package.json').version")
          node -e "require('fs').writeFileSync('VERSION', require('./package.json').version + '\n')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json VERSION
          git commit -m "chore(release): bump version to ${new_version} [skip ci]"
          git push origin HEAD:main
