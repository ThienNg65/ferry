name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    # Prevent infinite recursion from commits made by this workflow
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  auto-release:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-node-deps

      - name: Read version
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Finalize changelog
        run: node ./.github/scripts/prepare-release.js

      - name: Commit release changelog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes."
          else
            git commit -m "docs: finalize v${{ steps.version.outputs.version }} changelog"
          fi

      - name: Create tag
        shell: bash
        # Create tag locally. We will push it at the end with --follow-tags
        run: git tag "v${{ steps.version.outputs.version }}"

      - name: Build and Package with Electron Builder
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Generate release notes
        run: node ./.github/scripts/extract-release-notes.js

      - name: Bump next version
        run: npm version patch --no-git-tag-version

      - name: Update VERSION
        shell: bash
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');fs.writeFileSync('VERSION',p.version)"

      - name: Prepare next changelog
        run: node ./.github/scripts/prepare-next-version.js

      - name: Commit next development cycle and push
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add package.json package-lock.json VERSION CHANGELOG.md

          if git diff --cached --quiet; then
            echo "Nothing to commit for next cycle."
          else
            git commit -m "chore: start next development cycle"
          fi
          
          # Try to push everything. If it fails due to a race condition (non-fast-forward),
          # fail the workflow. Since we haven't touched GitHub Releases yet, no rollback is needed!
          if ! git push origin HEAD:main "v${{ steps.version.outputs.version }}"; then
            echo "::error::Push failed! Another commit was merged to main during the build."
            exit 1
          fi

      - name: Create GitHub Release and Upload Assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Since the tag is now pushed to GitHub, we can safely create the release
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/Ferry-Setup-*.exe \
            dist/*.blockmap \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
