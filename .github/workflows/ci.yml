name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    # Prevent infinite recursion from commits made by this workflow
    if: github.actor != 'github-actions[bot]'

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-node-deps

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Finalize changelog
        run: node ./.github/scripts/prepare-release.js

      - name: Commit release changelog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes."
          else
            git commit -m "docs: finalize v${{ steps.version.outputs.version }} changelog"
            git push origin HEAD:main
          fi

      - name: Create tag
        shell: bash
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Bump next version
        run: npm version patch --no-git-tag-version

      - name: Update VERSION
        shell: bash
        run: |
          node -e "const fs=require('fs');const p=require('./package.json');fs.writeFileSync('VERSION',p.version)"

      - name: Prepare next changelog
        run: node ./.github/scripts/prepare-next-version.js

      - name: Commit next development cycle
        shell: bash
        run: |
          git add package.json package-lock.json VERSION CHANGELOG.md

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: start next development cycle"
            git push origin HEAD:main
          fi
