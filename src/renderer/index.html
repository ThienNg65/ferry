<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- style-src keeps 'unsafe-inline' by necessity: xterm.js and Vue :style
         bindings set inline styles at runtime, and a nonce/hash CSP is infeasible
         for a statically-served packaged index.html. img-src/connect-src are
         'self' — the app loads no remote images and makes no remote fetches. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self'; connect-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <title>Ferry</title>
  </head>
  <body>
    <div id="app" class="isolate"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
