appId: com.ferry.app
productName: Ferry
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
# Auto-update feed — electron-updater (wired in src/main/update/AutoUpdater.ts)
# checks this on every launch of a packaged build, against this GitHub repo's
# Releases. `checkForUpdatesAndNotify()` fails quietly if no matching release
# has been published yet — see AutoUpdater.ts's error handling.
publish:
  provider: github
  owner: ThienNg65
  repo: ferry
  # electron-builder defaults to draft releases (hidden from the Releases page
  # until manually published) unless told otherwise.
  releaseType: release
# Code signing is NOT configured here — electron-builder picks up a certificate
# automatically from the standard CSC_LINK (path or base64 .pfx) + CSC_KEY_PASSWORD
# env vars at package time, with no config needed for the common case. Neither
# variable is set in this dev environment, so packaged builds here are
# unsigned; `forceCodeSigning: false` (the default) keeps `npm run package`
# working locally instead of hard-failing without a cert. Set both env vars in
# CI/release builds to produce a signed installer.
forceCodeSigning: false
# ssh2's optional native deps (cpu-features) cannot run from inside an asar
# archive — unpack them alongside the app. safeStorage needs no such
# handling: it's built into Electron itself, no native npm dependency.
asarUnpack:
  - node_modules/ssh2/**/*
  - node_modules/cpu-features/**/*
  - node_modules/nan/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
  # electron-builder auto-generates every required Windows icon resolution
  # from this single square PNG (no pre-made .ico needed).
  icon: resources/1024x1024.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Ferry
asar: true
# Ferry has no i18n/localization feature — only the en-US Chromium locale pack
# is needed. Without this, electron-builder ships all ~55 locale .pak files
# from the Electron prebuilt binary (~45MB uncompressed of unused strings).
electronLanguages:
  - en-US
# Electron Fuses — flip off the "run this Electron binary as a generic Node
# process" escape hatches and require the app to load only from the (integrity-
# checked) asar. electron-builder applies these to the packaged binary at build
# time via @electron/fuses (pulled in transitively — no extra dependency).
#   runAsNode / enableNodeOptionsEnvironmentVariable / enableNodeCliInspectArguments:
#     false  -> the packaged app cannot be coerced into executing arbitrary JS
#   enableCookieEncryption: true -> encrypt the cookie store at rest
#   enableEmbeddedAsarIntegrityValidation + onlyLoadAppFromAsar: true ->
#     tamper-detect the asar and refuse to load app code from anywhere else
# NOTE: validated only by a packaged smoke test (`npm run package` + launch) —
# a bad fuse config produces an app that fails to start, invisible to typecheck.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
